<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intro</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
height:100vh;
overflow:hidden;
background:radial-gradient(circle at 30% 30%, #1b1b3a, #0a0a1a 60%, #000);
color:white;
}

/* ================= FLOATING BOX ================= */
.box{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:500px;
padding:40px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(50px);
border:1px solid rgba(255,255,255,0.15);
border-radius:20px;
box-shadow:0 0 40px rgba(255,255,255,0.1);
animation:float 6s ease-in-out infinite alternate;
text-align:center;
}

@keyframes float{
0%{transform:translate(-50%,-50%) translateY(0px);}
100%{transform:translate(-50%,-50%) translateY(-25px);}
}

/* ================= TYPING ================= */
.typing{
min-height:80px;
font-size:16px;
line-height:1.6;
margin-bottom:20px;
}

.cursor{
display:inline-block;
width:2px;
background:white;
animation:blink 1s infinite;
margin-right:5px;
}

@keyframes blink{
0%,50%,100%{opacity:1;}
25%,75%{opacity:0;}
}

 

/* ================= METEOR ================= */
.meteor{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
box-shadow:0 0 10px white;
}

.meteor::after{
content:"";
position:absolute;
width:120px;
height:2px;
background:linear-gradient(to right, white, transparent);
transform:rotate(45deg);
transform-origin:left;
top:1px;
left:-120px;
}

/* ================= TWINKLE STAR ================= */
.twinkle{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkleAnim 1s linear forwards;
}

@keyframes twinkleAnim{
0%{opacity:0;}
50%{opacity:1;}
100%{opacity:0;}
}

/* ================= DOOR LOADING ================= */
#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
opacity:0;
pointer-events:none;
transition:.5s;
overflow:hidden;
}

.door{
position:absolute;
top:0;
width:50%;
height:100%;
background:#000;
transition:1.2s;
}

.left{left:0;transform:translateX(-100%);}
.right{right:0;transform:translateX(100%);}

.loader{
width:60px;
height:60px;
border:5px solid #333;
border-top:5px solid #fff;
border-radius:50%;
animation:spin 1s linear infinite;
opacity:0;
}

@keyframes spin{to{transform:rotate(360deg);}}
</style>
<style>
/* FLOAT STAR (tidak hilang) */
.float-star{
position:absolute;
border-radius:50%;
background:white;
opacity:.6;
filter:blur(.3px);
animation:floatMove linear infinite alternate;
}

@keyframes floatMove{
0%{transform:translate(0,0);}
100%{transform:translate(20px,-30px);}
}

/* METEOR */
.meteor{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
box-shadow:0 0 12px white;
}

.meteor::after{
content:"";
position:absolute;
height:2px;
background:linear-gradient(to right,white,transparent);
top:1px;
left:-150px;
}

/* TWINKLE */
.twinkle{
position:absolute;
border-radius:50%;
background:white;
opacity:0;
}
</style>
<style>
button{
display:none;
position:relative;
padding:12px 35px;
border-radius:30px;
border:2px solid white;
background:white;
color:#000;
font-weight:600;
cursor:pointer;
overflow:hidden;
transition:.3s ease;
z-index:1;
}

/* layer warna yang akan slide */
button::before{
content:"";
position:absolute;
top:0;
right:0;
width:0%;
height:100%;
background:linear-gradient(90deggrey,black);
transition:width .4s ease;
z-index:-1;
}

/* hover effect */
button:hover{
color:white;
transform:translateY(-4px);
box-shadow:0 0 25px rgba(255,255,255,0.4);
}

button:hover::before{
left:0;
right:auto;
width:100%;
}
</style>
</head>
<body>

<div class="box">
<div class="typing">
<span class="cursor"></span><span id="text"></span>
</div>
<button id="okBtn" onclick="Tutup()">OK</button>
</div>

<div id="overlay">
<div class="door left"></div>
<div class="door right"></div>
<div class="loader"></div>
</div>

<script>
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

/* ================= TYPING ================= */
async function typeWords(element, text){
let words=text.split(" ");
for(let i=0;i<words.length;i++){

if(words[i]==="<jeda"){
let delay=parseInt(words[i+1]);
await sleep(delay);
i++;
continue;
}

if(words[i].includes("<stop>")) break;

let word=words[i]+" ";
for(let j=0;j<word.length;j+=3){
element.innerHTML+=word.slice(j,j+3);
await sleep(100);
}
}
document.getElementById("okBtn").style.display="inline-block";
}

typeWords(
document.getElementById("text"),
"Halo Pendatang.. <jeda 500> Academy Bijih Naga didirikan oleh ArcZNewEra Sekaligus KepalaSekolah Untuk Mengajar Kan Cara Pvp Dan Meningkatkan Pvp Bloxfruit kita... <jeda 1200> Tekan OK untuk melanjutkan. <stop>"
);

/* ================= METEOR SYSTEM ================= */
 

/* ================= DOOR LOADING ================= */
function Tutup(){
const overlay=document.getElementById("overlay");
const left=document.querySelector(".left");
const right=document.querySelector(".right");
const loader=document.querySelector(".loader");

overlay.style.opacity="1";
overlay.style.pointerEvents="all";

setTimeout(()=>{
left.style.transform="translateX(0)";
right.style.transform="translateX(0)";
},100);

setTimeout(()=>loader.style.opacity="1",1200);

setTimeout(()=>{
window.location.href="base.html";
},7000);
}
</script>
<script>

/* ================= FLOAT STAR (PERMANEN) ================= */
for(let i=0;i<60;i++){
let s=document.createElement("div");
s.className="float-star";

let size=Math.random()*3+1;
s.style.width=size+"px";
s.style.height=size+"px";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
s.style.opacity=Math.random();
s.style.animationDuration=(8+Math.random()*10)+"s";

document.body.appendChild(s);
}

/* Tambah star baru tiap 5 detik (tidak hapus yang lama) */
setInterval(()=>{
let s=document.createElement("div");
s.className="float-star";
let size=Math.random()*3+1;
s.style.width=size+"px";
s.style.height=size+"px";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
s.style.opacity=Math.random();
s.style.animationDuration=(8+Math.random()*10)+"s";
document.body.appendChild(s);
},5000);


/* ================= METEOR (KIRI ATAS ➜ KANAN BAWAH) ================= */
 


/* ================= TWINKLE SYSTEM ================= */
function spawnTwinkleGroup(){

let total=4+Math.floor(Math.random()*12); // 4-15

for(let i=0;i<total;i++){

let t=document.createElement("div");
t.className="twinkle";

let size=Math.random()*3+1;
t.style.width=size+"px";
t.style.height=size+"px";
t.style.left=Math.random()*100+"vw";
t.style.top=Math.random()*100+"vh";

document.body.appendChild(t);

let blinkCount=4+Math.floor(Math.random()*3); // 4-6
let blink=0;

let blinkInterval=setInterval(()=>{
t.style.opacity = t.style.opacity==1 ? 0 : 1;
blink++;
if(blink>=blinkCount*2){
clearInterval(blinkInterval);
t.remove();
}
},200);

}
}

/* tiap 2.5 detik muncul grup baru */
setInterval(spawnTwinkleGroup,2500);

</script>
</body>
</html>
